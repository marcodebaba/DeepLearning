name: Deploy CNN to Kaggle

on:
  push:
    branches: [main]
    paths:
      - 'CNN/**'
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Lint CNN code
        run: flake8 CNN/*.py --max-line-length=120 --ignore=E501,W503,E203,E302,E303,E305,E265

  deploy:
    name: Deploy to Kaggle
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kaggle API
        run: pip install kaggle

      - name: Push CNN kernel to Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: kaggle kernels push -p ./CNN
